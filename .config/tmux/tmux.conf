# Set leader key
set -g prefix C-j

set-option -g status-position top
set -g default-terminal "screen-256color"

# Pane borders settings
set -g pane-border-lines double
set -g pane-active-border-style bg=default,fg=#2DA359
set -g pane-border-style fg=#3465A4

# Status bar options
set -g window-status-current-format "#I #W"
set -g window-status-format "#I #W#F"
set -g window-status-separator "    "
set -g status-left "#S    "
set -g status-right "#(whoami)@#H    %H:%M   %Y-%b-%d"

# Status bar colours
set -g status-style fg=#729FCF,bold,bg=default
set -g window-status-current-style fg=#2B2E34,bg=#2DA359
# Different green versions"#4EF484" "#39C36A" "#2DA359"
set -g status-left-style fg=white
set -g status-right-style fg=white

set -g mouse on
set -g base-index 1
set -g renumber-windows on
setw -g mode-keys vi

unbind R
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Reloading TMUX config"

unbind r
bind r command-prompt "rename-window %%"
unbind %
bind % command-prompt "rename-session %%"

# Open panes in current directory
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
bind b split-window -v -c "#{pane_current_path}"

# Change active pane
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Change windows using SHIFT + ALT + H/L
bind-key -n M-H previous-window
bind-key -n M-L next-window

bind-key p last-window
